<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/geist@1/dist/fonts/geist-sans/style.css"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/geist@1/dist/fonts/geist-mono/style.css"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: "Geist", sans-serif;
        background: #09090b;
        color: #fafafa;
        min-height: 100vh;
        padding: 2rem 3rem;
        -webkit-font-smoothing: antialiased;
      }
      h1 {
        font-size: 1.75rem;
        font-weight: 700;
        margin-bottom: 1.5rem;
        letter-spacing: -0.02em;
      }
      .stats {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 1.5rem;
        margin-bottom: 2rem;
      }
      .stat {
        background: #111113;
        padding: 1.5rem;
        border-radius: 0.75rem;
        border: 1px solid #1a1a1e;
      }
      .stat-label {
        font-size: 0.85rem;
        color: #52525b;
        margin-bottom: 0.5rem;
        font-weight: 500;
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }
      .stat-value {
        font-size: 2rem;
        font-weight: 700;
        letter-spacing: -0.03em;
      }
      .stat-change {
        font-size: 0.85rem;
        color: #a1a1aa;
        margin-top: 0.25rem;
        font-weight: 500;
      }
      .chart {
        background: #111113;
        border-radius: 0.75rem;
        padding: 1.5rem;
        height: 240px;
        display: flex;
        align-items: flex-end;
        gap: 0.75rem;
        border: 1px solid #1a1a1e;
      }
      .bar {
        flex: 1;
        background: linear-gradient(to top, #3f3f46, #71717a);
        border-radius: 0.375rem 0.375rem 0 0;
        transition: height 0.3s;
      }
      a.view-all {
        display: inline-block;
        margin-top: 1.5rem;
        color: #a1a1aa;
        text-decoration: none;
        font-weight: 500;
        transition: color 0.2s;
      }
      a.view-all:hover {
        color: #fafafa;
      }
      .reports {
        display: none;
        margin-top: 1.5rem;
        background: #111113;
        border: 1px solid #1a1a1e;
        border-radius: 0.75rem;
        overflow: hidden;
        opacity: 0;
        transform: translateY(8px);
        transition:
          opacity 0.4s ease,
          transform 0.4s ease;
      }
      .reports.visible {
        opacity: 1;
        transform: translateY(0);
      }
      .reports-header {
        display: grid;
        grid-template-columns: 2fr 1fr 1fr 1fr;
        padding: 0.75rem 1.5rem;
        font-size: 0.75rem;
        color: #52525b;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        font-weight: 600;
        border-bottom: 1px solid #1a1a1e;
      }
      .reports-row {
        display: grid;
        grid-template-columns: 2fr 1fr 1fr 1fr;
        padding: 0.875rem 1.5rem;
        font-size: 0.875rem;
        border-bottom: 1px solid #0f0f11;
        transition: background 0.15s;
      }
      .reports-row:last-child {
        border-bottom: none;
      }
      .reports-row:hover {
        background: rgba(255, 255, 255, 0.02);
      }
      .reports-row .name {
        color: #e4e4e7;
        font-weight: 500;
      }
      .reports-row .num {
        color: #a1a1aa;
        font-family: "Geist Mono", monospace;
      }
      .reports-row .delta-up {
        color: #a1a1aa;
      }
    </style>
  </head>
  <body>
    <h1>Analytics Dashboard</h1>
    <div class="stats">
      <div class="stat">
        <div class="stat-label">Total Visitors</div>
        <div class="stat-value">24,891</div>
        <div class="stat-change">+12.5%</div>
      </div>
      <div class="stat">
        <div class="stat-label">Conversions</div>
        <div class="stat-value">1,429</div>
        <div class="stat-change">+8.2%</div>
      </div>
      <div class="stat">
        <div class="stat-label">Revenue</div>
        <div class="stat-value">$48,200</div>
        <div class="stat-change">+23.1%</div>
      </div>
    </div>
    <div class="chart">
      <div class="bar" style="height: 40%"></div>
      <div class="bar" style="height: 65%"></div>
      <div class="bar" style="height: 45%"></div>
      <div class="bar" style="height: 80%"></div>
      <div class="bar" style="height: 55%"></div>
      <div class="bar" style="height: 90%"></div>
      <div class="bar" style="height: 70%"></div>
      <div class="bar" style="height: 85%"></div>
      <div class="bar" style="height: 60%"></div>
      <div class="bar" style="height: 95%"></div>
      <div class="bar" style="height: 75%"></div>
      <div class="bar" style="height: 100%"></div>
    </div>
    <a href="#all" class="view-all">View All Reports</a>
    <div class="reports">
      <div class="reports-header">
        <span>Report</span><span>Visitors</span><span>Revenue</span><span>Change</span>
      </div>
      <div class="reports-row">
        <span class="name">Q4 Summary</span><span class="num">12,481</span
        ><span class="num">$24,100</span><span class="delta-up">+18.3%</span>
      </div>
      <div class="reports-row">
        <span class="name">Q3 Summary</span><span class="num">10,204</span
        ><span class="num">$19,800</span><span class="delta-up">+12.1%</span>
      </div>
      <div class="reports-row">
        <span class="name">Q2 Summary</span><span class="num">8,932</span
        ><span class="num">$16,400</span><span class="delta-up">+9.7%</span>
      </div>
      <div class="reports-row">
        <span class="name">Q1 Summary</span><span class="num">7,610</span
        ><span class="num">$14,200</span><span class="delta-up">+6.4%</span>
      </div>
    </div>
    <script>
      document.querySelector(".view-all").addEventListener("click", function (e) {
        e.preventDefault();
        var reports = document.querySelector(".reports");
        if (reports.style.display === "block") return;
        this.textContent = "All Reports";
        reports.style.display = "block";
        setTimeout(function () {
          reports.classList.add("visible");
        }, 30);
      });
    </script>
  </body>
</html>
